<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1976D2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>FileService</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f5;
    }
    .app-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1976D2 0%, #2196F3 50%, #03A9F4 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    .loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
    }
    .loading-icon {
      width: 100px;
      height: 100px;
      background: white;
      border-radius: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 50px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      animation: bounce 2s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .loading-text {
      margin-top: 30px;
      color: white;
      font-size: 20px;
      font-weight: 500;
      opacity: 0.95;
      letter-spacing: 2px;
    }
    .loading-dots {
      display: inline-block;
    }
    .app-version {
      position: absolute;
      bottom: 40px;
      color: rgba(255,255,255,0.7);
      font-size: 14px;
    }
    .error-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #f5f5f5;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      z-index: 9998;
    }
    .error-screen.show {
      display: flex;
    }
    .error-icon {
      font-size: 80px;
      margin-bottom: 24px;
    }
    .error-title {
      color: #333;
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .error-message {
      color: #666;
      font-size: 14px;
      text-align: center;
      margin-bottom: 30px;
      line-height: 1.6;
    }
    .retry-btn {
      background: #1976D2;
      color: white;
      border: none;
      padding: 14px 40px;
      border-radius: 28px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(25,118,210,0.4);
      transition: all 0.3s ease;
    }
    .retry-btn:active {
      transform: scale(0.96);
      box-shadow: 0 2px 8px rgba(25,118,210,0.3);
    }
  </style>
  <script type="module" crossorigin src="./assets/index-C6v4f2Iq.js"></script>
</head>
<body>
  <div class="app-container">
    <loading-screen class="loading-screen">
      <div class="loading-icon">&#128193;</div>
      <div class="loading-text">&#27491;&#22312;&#21551;&#21160;<span class="loading-dots">...</span></div>
      <div class="app-version">v1.0.0</div>
    </loading-screen>

    <error-screen class="error-screen">
      <div class="error-icon">&#9888;</div>
      <div class="error-title">&#32593;&#32476;&#36830;&#25509;&#22833;&#36133;</div>
      <div class="error-message">&#26080;&#27861;&#36830;&#25509;&#21040;&#26381;&#21153;&#22120;<br>&#35874;&#26816;&#26597;&#32593;&#32476;&#21518;&#37325;&#35797;</div>
      <button class="retry-btn" onclick="location.reload()">&#37325;&#26032;&#21152;&#36733;</button>
    </error-screen>
  </div>

</body>
</html>
